<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>folk · Claude Code</title>
<meta name="viewport" content="width=1280" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="onboarding.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="mcp.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "density": "compact"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState('mcp');
  const [mcps, setMcps] = React.useState(INITIAL_MCPS);
  const [skills, setSkills] = React.useState(INITIAL_SKILLS);
  const [plugins, setPlugins] = React.useState(INITIAL_PLUGINS);
  const [selectedMcp, setSelectedMcp] = React.useState('fs');
  const [cmdkOpen, setCmdkOpen] = React.useState(false);
  const [toasts, setToasts] = React.useState([]);
  const [model, setModel] = React.useState('claude-sonnet-4-5');
  const [configuredProviders, setConfiguredProviders] = React.useState([
    { id: 'anthropic', enabledModels: ['claude-sonnet-4-5', 'claude-opus-4', 'claude-haiku-4-5'] },
    { id: 'moonshot', enabledModels: ['kimi-k2', 'moonshot-v1-128k'] },
    { id: 'zhipu', enabledModels: ['glm-4.6', 'glm-4-air'] },
  ]);
  const [sbCollapsed, setSbCollapsed] = React.useState(false);
  const [profile, setProfile] = React.useState({
    name: 'Jamie Chen',
    nickname: 'Jamie',
    pronouns: 'they/them',
    role: 'Product engineer',
    tone: 'Warm but concise',
    avoid: '',
    about: '',
  });
  const [pendingAdd, setPendingAdd] = React.useState(false);
  const [firstRun, setFirstRun] = React.useState(() => {
    try { return localStorage.getItem('folk.onboarded') !== '1'; } catch { return true; }
  });

  const addProvider = React.useCallback((id, _key) => {
    setConfiguredProviders(cps => {
      if (cps.find(c => c.id === id)) return cps;
      const def = (typeof PROVIDERS !== 'undefined' && PROVIDERS.find(p => p.id === id));
      const enabled = def ? def.defaultModels.slice(0, 2).map(m => m.id) : [];
      return [...cps, { id, enabledModels: enabled }];
    });
  }, []);

  const finishFirstRun = React.useCallback(() => {
    try { localStorage.setItem('folk.onboarded', '1'); } catch {}
    setFirstRun(false);
  }, []);

  const replayOnboarding = React.useCallback(() => {
    try { localStorage.removeItem('folk.onboarded'); } catch {}
    setFirstRun(true);
  }, []);

  const toast = React.useCallback((text, kind='ok') => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, { id, text, kind }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 2400);
  }, []);

  const nav = (id, action) => {
    setPage(id);
    if (id === 'mcp' && action === 'add') setPendingAdd(true);
  };

  React.useEffect(() => {
    document.documentElement.dataset.theme = t.dark ? 'dark' : 'light';
    document.documentElement.dataset.density = t.density;
  }, [t.dark, t.density]);

  React.useEffect(() => {
    const h = (e) => {
      const mod = e.metaKey || e.ctrlKey;
      if (mod && e.key.toLowerCase() === 'k') { e.preventDefault(); setCmdkOpen(true); }
      if (mod && e.key === '1') { e.preventDefault(); setPage('mcp'); }
      if (mod && e.key === '2') { e.preventDefault(); setPage('skills'); }
      if (mod && e.key === '3') { e.preventDefault(); setPage('plugins'); }
      if (e.key === 'Escape') setCmdkOpen(false);
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const counts = {
    mcp: mcps.length,
    skills: skills.filter(s => s.enabled).length,
    plugins: plugins.filter(p => p.status === 'enabled').length,
  };

  const crumbs = {
    mcp: ['Workspace', 'MCP Servers'],
    skills: ['Workspace', 'Skills'],
    plugins: ['Workspace', 'Plugins'],
    sessions: ['Workspace', 'Sessions'],
    marketplace: ['Discover', 'Marketplace'],
    keybindings: ['Configure', 'Keybindings'],
    model: ['Configure', 'Models & Providers'],
    profile: ['You', 'Profile'],
  }[page];

  return (
    <div className={'shell' + (sbCollapsed ? ' sb-closed' : '')}>
      <Sidebar current={page} onNav={nav} counts={counts} collapsed={sbCollapsed} onToggle={() => setSbCollapsed(c => !c)} profile={profile} />
      <main className="main">
        <Topbar crumbs={crumbs} onOpenCmdK={() => setCmdkOpen(true)} />
        <div className={'main-body scroll' + (page === 'sessions' ? ' no-scroll' : '')}>
          {page === 'mcp' && <MCPPage mcps={mcps} setMcps={setMcps} selected={selectedMcp} setSelected={setSelectedMcp} toast={toast}
            openAddInitially={pendingAdd} consumeAdd={() => setPendingAdd(false)} />}
          {page === 'skills' && <SkillsPage skills={skills} setSkills={setSkills} toast={toast} />}
          {page === 'plugins' && <PluginsPage plugins={plugins} setPlugins={setPlugins} toast={toast} />}
          {page === 'sessions' && <SessionsPage toast={toast} model={model} setModel={setModel} mcps={mcps} configuredProviders={configuredProviders} />}
          {page === 'marketplace' && <MarketplacePage toast={toast} />}
          {page === 'keybindings' && <KeybindingsPage />}
          {page === 'model' && <ModelPage model={model} setModel={setModel} toast={toast} configuredProviders={configuredProviders} setConfiguredProviders={setConfiguredProviders} />}
          {page === 'profile' && <ProfilePage profile={profile} setProfile={setProfile} toast={toast} />}
        </div>
      </main>

      <CommandPalette open={cmdkOpen} onClose={() => setCmdkOpen(false)} onNav={nav} />
      <Toasts items={toasts} />

      {firstRun && (
        <FirstRunOnboarding
          profile={profile}
          setProfile={setProfile}
          addProvider={addProvider}
          toast={toast}
          onDone={finishFirstRun}
        />
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Appearance" />
        <TweakToggle label="Dark mode" value={t.dark} onChange={v => setTweak('dark', v)} />
        <TweakRadio label="Density" value={t.density} options={['compact', 'regular']} onChange={v => setTweak('density', v)} />
        <TweakSection label="Onboarding" />
        <TweakButton label="Replay first-run onboarding" onClick={replayOnboarding} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
