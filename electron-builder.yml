appId: dev.barock.folk
productName: Folk
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!docs/*'
  - '!specs/*'
  - '!tests/*'
  - '!.specify/*'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  extendInfo:
    - NSDocumentsFolderUsageDescription: Folk needs access to your Documents folder to read and write files.
    - NSDownloadsFolderUsageDescription: Folk needs access to your Downloads folder to save files.
  notarize: true
dmg:
  artifactName: Folk-${version}-${arch}.${ext}
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  executableName: Folk
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: Folk-${version}-setup.${ext}
  shortcutName: Folk
  uninstallDisplayName: Folk
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  maintainer: barock
  category: Utility
  icon: build/icon.png
appImage:
  artifactName: Folk-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: barockok
  repo: folk
