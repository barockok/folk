appId: com.folk.app
productName: folk
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
asar: true
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
